<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mülltonnen">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a5c1a">
<link rel="manifest" id="pwaManifest">
<title>🗑️ Mülltonnen-Meldung v2.01</title>
<style>
/* Design-System Definitionen */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1a5c1a; --g2:#2d7a2d; --g3:#e6f4e6; --g4:#c8e6c8; 
  --o:#d05a00; --r:#b91c1c; --y:#b45309; --yl:#fef3c7; 
  --gray:#6b7280; --gray2:#d1d5db; --gray3:#f3f4f6; --gray4:#9ca3af; 
  --text:#111827; --white:#fff; --blue:#1d4ed8; --blue-l:#eff6ff; 
  --radius:14px; --shadow:0 1px 8px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06); 
  --header-h:52px; --font:'DM Sans',system-ui,-apple-system,sans-serif
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:#f0f2f0;color:var(--text);display:flex;flex-direction:column}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

#hdr{background:linear-gradient(135deg,var(--g) 0%,var(--g2) 100%);color:var(--white);height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:10}
#hdr h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:7px}

#tabs{display:flex;background:var(--white);border-bottom:1px solid var(--gray2);flex-shrink:0}
.tb{flex:1;border:none;background:none;cursor:pointer;padding:10px 4px 8px;font-size:11px;font-weight:600;color:var(--gray4);display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.tb.on{color:var(--g)}
.tb::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2.5px;background:var(--g);border-radius:2px;transform:scaleX(0);transition:0.2s}
.tb.on::after{transform:scaleX(1)}

#wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pane{display:none;padding:14px 14px 24px}
.pane.on{display:block}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.clabel{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--gray4);margin-bottom:11px;display:flex;align-items:center;gap:5px}

.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
/* Grid für die 4 umbenannten Müllarten */
.wgrid{display:grid;grid-template-columns:repeat(4, 1fr);gap:5px} 

.cbtn{padding:10px 4px;border:2px solid var(--gray2);background:var(--gray3);border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;color:var(--text);transition:0.15s}
.cbtn.sel{border-color:var(--g2);background:var(--g3);color:var(--g);box-shadow:0 0 0 3px var(--g4)}

textarea, input, select{width:100%;padding:11px;border:1.5px solid var(--gray2);border-radius:9px;font-size:14px;background:var(--white)}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:4px}

.btn{display:block;width:100%;padding:14px;border:none;border-radius:11px;cursor:pointer;font-size:15px;font-weight:700}
.btn-p{background:linear-gradient(135deg,var(--g) 0%,var(--g2) 100%);color:#fff}
.btn-s{background:var(--gray3);color:var(--text);border:1.5px solid var(--gray2)}
.btn-d{background:var(--r);color:#fff}

.help-step{display:flex;gap:10px;margin-bottom:12px;background:var(--gray3);padding:10px;border-radius:8px}
.step-num{background:var(--g);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}

</head>
<body>
<div id="hdr">
  <h1>🗑️ Mülltonnen-Meldung <small style="font-size:10px;opacity:0.7">v2.01</small></h1>
  <span class="cr">© Michael Elvey</span>
</div>

<div id="tabs">
  <button class="tb on" onclick="showTab('m')" id="tb-m"><span class="ti">📋</span>Meldung</button>
  <button class="tb" onclick="showTab('v')" id="tb-v"><span class="ti">🕐</span>Verlauf</button>
  <button class="tb" onclick="showTab('e')" id="tb-e"><span class="ti">⚙️</span>Setup</button>
  <button class="tb" onclick="showTab('h')" id="tb-h"><span class="ti">❓</span>Hilfe</button>
</div>

<div id="wrap">
  <div class="pane on" id="pane-m">
    <div class="card">
      <div class="clabel">📁 Kategorie *</div>
      <div class="catgrid" id="catGrid"></div>
    </div>

<div class="card">
      <div class="clabel">🗑️ Müllart</div>
      <div class="wgrid" id="wasteGrid"></div>
    </div>

    <div class="card">
      <div class="clabel">🚦 Status</div>
      <div class="catgrid" id="statusGrid">
        <button class="cbtn sel" data-s="Geleert" onclick="selStatus('Geleert')">✅ Geleert</button>
        <button class="cbtn" data-s="Nicht Geleert" onclick="selStatus('Nicht Geleert')">⚠️ Nicht Geleert</button>
      </div>
    </div>

    <div class="card">
      <div class="clabel">📍 Standort & Fotos</div>
      <div style="font-size:13px;color:var(--gray);margin-bottom:10px" id="gpsTxt">Wird automatisch erfasst...</div>
      <textarea id="notesIn" placeholder="Optionale Hinweise..." rows="2"></textarea>
    </div>

    <button class="btn btn-p" id="sendBtn" onclick="sendEntry()">📤 Meldung senden</button>
  </div>

<div class="pane" id="pane-v">
    <div id="histList"></div>
  </div>

  <div class="pane" id="pane-e">
    <div class="card">
      <div class="clabel">👤 Setup (Zuerst ausfüllen!)</div>
      <div class="field"><label>Fahrername</label><input type="text" id="sName"></div>
      <div class="field"><label>Fahrzeug</label><input type="text" id="sPlate"></div>
      <div class="field"><label>Standard Müllsorte</label>
        <select id="sWaste">
          <option value="Restmüll (RM)">Restmüll (RM)</option>
          <option value="Biomüll (BIO)">Biomüll (BIO)</option>
          <option value="Papiermüll (Papier)">Papiermüll (Papier)</option>
          <option value="Gelber Sack (GS)">Gelber Sack (GS)</option>
        </select>
      </div>
      <div class="field"><label>E-Mail Empfänger</label><input type="email" id="sEmail"></div>
    </div>
    <button class="btn btn-p" onclick="saveSettings()">💾 Speichern</button>
  </div>

<div class="pane" id="pane-h">
    <div class="card">
      <div class="clabel">📖 Benutzerhandbuch</div>
      <p style="font-size:13px;margin-bottom:15px">Willkommen zur Version 2.01. Bitte folgen Sie diesen Schritten:</p>
      
      <div class="help-step">
        <div class="step-num">1</div>
        <div style="font-size:13px"><strong>Ersteinrichtung:</strong> Öffnen Sie den Reiter <strong>Setup</strong> und geben Sie einmalig Ihren Namen und das Fahrzeug an.</div>
      </div>
      
      <div class="help-step">
        <div class="step-num">2</div>
        <div style="font-size:13px"><strong>Standard festlegen:</strong> Wählen Sie im Setup die Müllsorte, mit der Sie meistens arbeiten.</div>
      </div>

      <div class="help-step">
        <div class="step-num">3</div>
        <div style="font-size:13px"><strong>Meldung senden:</strong> Kategorie wählen, ggf. Müllart kurz korrigieren und absenden. Der Status ist automatisch auf "Geleert".</div>
      </div>
    </div>
  </div>
</div>
<div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px;border-radius:8px;display:none;z-index:1000"></div>
<script>
/** * KONFIGURATION & MAPPING (Punkt 1: Umbenennung)
 */
const VERSION = "2.01";
const CATS = [
  {k:'Chip defekt',i:'💾'}, {k:'nicht bereitgestellt',i:'❌'},
  {k:'Überfüllt',i:'📦'}, {k:'Fehlbefüllung',i:'⚠️'},
  {k:'in Schüttung gefallen',i:'⬇️'}, {k:'Sonstiges',i:'📌'}
];

// Definition der Müllarten: Value = Speicherwert, Display = Button-Beschriftung
const WASTE_MAP = [
  {v: 'Restmüll (RM)', d: 'RM'},
  {v: 'Biomüll (BIO)', d: 'Bio'},
  {v: 'Papiermüll (Papier)', d: 'Papier'},
  {v: 'Gelber Sack (GS)', d: 'GS'}
];

let settings = {driverName:'', licensePlate:'', email:'', defaultWasteType: 'Restmüll (RM)'};
let cur = null;
const DB_NAME = 'MuellDB_v2';

// Datenbank Initialisierung
async function openDB() {
  return new Promise((res) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      db.createObjectStore('entries', {keyPath:'id'});
      db.createObjectStore('settings');
    };
    req.onsuccess = () => res(req.result);
  });
}
</script>

<script>
/**
 * FORMULAR-FUNKTIONEN
 */
function newEntry() {
  cur = {
    id: Date.now().toString(36),
    createdAt: new Date().toISOString(),
    category: '',
    wasteType: settings.defaultWasteType,
    status: 'Geleert' // Punkt 2: Standard "Geleert"
  };
  updateWasteUI();
}

// Erzeugt die Buttons RM, Bio, Papier, GS (Punkt 1 Korrektur)
function updateWasteUI() {
  const grid = document.getElementById('wasteGrid');
  grid.innerHTML = WASTE_MAP.map(w => `
    <button class="cbtn ${cur.wasteType === w.v ? 'sel' : ''}" 
            onclick="selWasteType('${w.v}')">${w.d}</button>
  `).join('');
}

function selWasteType(val) {
  cur.wasteType = val;
  updateWasteUI();
}

function selStatus(val) {
  cur.status = val;
  document.querySelectorAll('#statusGrid .cbtn').forEach(b => {
    b.classList.toggle('sel', b.dataset.s === val);
  });
}

function selCat(val) {
  cur.category = val;
  document.querySelectorAll('#catGrid .cbtn').forEach(b => {
    b.classList.toggle('sel', b.dataset.k === val);
  });
}
</script>

<script>
/**
 * VERSAND-LOGIK
 */
async function sendEntry() {
  if(!cur.category) { showToast('Bitte Kategorie wählen!'); return; }
  
  cur.notes = document.getElementById('notesIn').value;
  
  // Betreffzeile für die E-Mail
  const subject = `Meldung: ${cur.category} | ${cur.wasteType}`;
  
  // Textinhalt der Mail
  const body = `MELDUNG v${VERSION}
----------------------
Datum: ${new Date().toLocaleString()}
Fahrer: ${settings.driverName}
Fahrzeug: ${settings.licensePlate}

Müllart: ${cur.wasteType}
Status: ${cur.status}
Kategorie: ${cur.category}
Hinweis: ${cur.notes}
----------------------`;

  const mailUri = `mailto:${settings.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailUri;
  
  // Speichern in DB
  const db = await openDB();
  db.transaction('entries','readwrite').objectStore('entries').put(cur);
  
  showToast('✅ Gesendet!');
  setTimeout(resetForm, 1000);
}

function resetForm() {
  newEntry();
  document.getElementById('notesIn').value = '';
  document.querySelectorAll('#catGrid .cbtn').forEach(b => b.classList.remove('sel'));
  selStatus('Geleert');
}
</script>

<script>
/**
 * SETUP & NAVIGATION
 */
async function saveSettings() {
  settings.driverName = document.getElementById('sName').value;
  settings.licensePlate = document.getElementById('sPlate').value;
  settings.email = document.getElementById('sEmail').value;
  settings.defaultWasteType = document.getElementById('sWaste').value;
  
  const db = await openDB();
  db.transaction('settings','readwrite').objectStore('settings').put(settings, 'config');
  
  showToast('💾 Einstellungen gespeichert!');
  newEntry(); // Standard-Müllart übernehmen
  showTab('m');
}

function showTab(id) {
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  document.getElementById('tb-'+id).classList.add('on');
  document.getElementById('pane-'+id).classList.add('on');
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>

<script>
/**
 * INITIALISIERUNG BEIM START
 */
async function init() {
  // Kategorien Buttons bauen
  document.getElementById('catGrid').innerHTML = CATS.map(c => `
    <button class="cbtn" data-k="${c.k}" onclick="selCat('${c.k}')">
      <span style="display:block;font-size:18px">${c.i}</span>${c.k}
    </button>
  `).join('');

  // Einstellungen laden
  const db = await openDB();
  const req = db.transaction('settings','readonly').objectStore('settings').get('config');
  req.onsuccess = () => {
    if(req.result) {
      settings = req.result;
      document.getElementById('sName').value = settings.driverName;
      document.getElementById('sPlate').value = settings.licensePlate;
      document.getElementById('sEmail').value = settings.email;
      document.getElementById('sWaste').value = settings.defaultWasteType;
    }
    newEntry(); // Startet die App mit den geladenen Werten
  };
}

// Start-Befehl
init();
</script>
</body>
</html>
